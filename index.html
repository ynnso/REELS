<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BUZZREELS INSPO</title>
  <style>
    :root {
      --bg-color: #0b0d17;
      --card-bg: #13172b;
      --card-border: #1e2442;
      --text-main: #ffffff;
      --accent-pink: #e91e63;
      --button-bg: #282c47;
      --input-bg: #161a33;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 24px;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .logo-icon {
      background: var(--accent-pink);
      border-radius: 8px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    header h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.5px;
      margin: 0;
      text-transform: uppercase;
    }

    /* CONTROL BAR */
    .control-bar {
      background-color: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
      position: relative;
    }

    .search-container {
      position: relative;
      flex: 1;
    }

    .search-input {
      width: 100%;
      background-color: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 12px 16px;
      color: #fff;
      font-size: 14px;
      box-sizing: border-box;
      outline: none;
    }

    .search-input::placeholder {
      color: #6c7293;
    }

    .search-suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 0 0 8px 8px;
      max-height: 240px;
      overflow-y: auto;
      z-index: 1000;
      display: none;
      box-shadow: 0 8px 16px rgba(0,0,0,0.5);
    }

    .suggestion-item {
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
      border-bottom: 1px solid var(--card-border);
    }

    .suggestion-item:hover {
      background-color: var(--input-bg);
      color: var(--accent-pink);
    }

    /* BUTTONS */
    .btn {
      border: none;
      border-radius: 8px;
      padding: 12px 20px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #fff;
      white-space: nowrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, #f06292, #e91e63);
    }

    /* REELS GRID SYSTEM */
    .reels-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }

    /* CARD DESIGN */
    .reel-card {
      background-color: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .card-header {
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .tag-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 4px 8px;
      border-radius: 12px;
      background: rgba(233, 30, 99, 0.2);
      color: var(--accent-pink);
      text-transform: uppercase;
      display: inline-block;
    }

    /* PERFECT 9:16 CROP & SCALE - ELIMINATES WHITE BOX & BLACK EDGES */
    .video-preview-wrapper {
      width: 100%;
      aspect-ratio: 9 / 16;
      overflow: hidden;
      position: relative;
      background-color: #000;
    }

    .video-preview-wrapper iframe {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 440px;
      height: 780px;
      /* Zooming in physically crops out Instagram headers, white bottom boxes, and side bars */
      transform: translate(-50%, -51%) scale(1.36);
      border: none;
    }

    .card-body {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background-color: var(--card-bg);
      z-index: 2;
    }

    .reel-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      margin: 0;
      line-height: 1.3;
      flex: 1;
    }

    /* SOP + BUTTON STYLING */
    .sop-btn {
      min-width: 38px;
      height: 38px;
      background-color: var(--button-bg);
      border: 1px solid var(--card-border);
      color: #fff;
      border-radius: 8px;
      font-weight: 700;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s, transform 0.1s;
    }

    .sop-btn:hover {
      background-color: var(--accent-pink);
      border-color: var(--accent-pink);
      transform: scale(1.05);
    }

    /* MODAL FOR GOOGLE DOC / REEL UPLOAD */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .modal-box {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .modal-box h3 { margin: 0; }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 12px;
      color: #9fa8da;
    }

    .form-group input {
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      padding: 10px;
      color: #fff;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
        <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
      </svg>
    </div>
    <h1>BUZZREELS INSPO</h1>
  </header>

  <!-- CONTROLS -->
  <div class="control-bar">
    <div class="search-container">
      <input type="text" id="searchInput" class="search-input" placeholder="Search reels, concepts, or keywords..." onkeyup="handlePredictiveSearch()">
      <div id="searchSuggestions" class="search-suggestions"></div>
    </div>

    <button class="btn btn-primary" onclick="openUploadModal()">
      <span>+</span> Add Reel / Upload SOP
    </button>
  </div>

  <!-- REELS LIBRARY GRID -->
  <div class="reels-grid" id="reelsGrid"></div>

  <!-- UPLOAD MODAL -->
  <div id="uploadModal" class="modal-overlay">
    <div class="modal-box">
      <h3>Upload New Reel & Google Doc SOP</h3>
      <div class="form-group">
        <label>Reel Title</label>
        <input type="text" id="reelTitleInput" placeholder="e.g. IF AGENTS WERE HONEST">
      </div>
      <div class="form-group">
        <label>Category Tag</label>
        <input type="text" id="reelTagInput" placeholder="e.g. HONEST REAL ESTATE VIDEO">
      </div>
      <div class="form-group">
        <label>Instagram Reel Link</label>
        <input type="text" id="reelUrlInput" placeholder="https://www.instagram.com/reel/...">
      </div>
      <div class="form-group">
        <label>Google Doc SOP Link</label>
        <input type="text" id="gdocUrlInput" placeholder="https://docs.google.com/document/d/...">
      </div>
      <div style="display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px;">
        <button class="btn" style="background: #444;" onclick="closeUploadModal()">Cancel</button>
        <button class="btn btn-primary" onclick="addNewReel()">Save to Library</button>
      </div>
    </div>
  </div>

  <script>
    let reelsData = [
      { id: 1, tag: "HONEST REAL ESTATE VIDEO", title: "IF REAL ESTATE VIDEOS WERE HONEST", videoUrl: "https://www.instagram.com/reel/DOUWDbcEj1Z/embed", sopDocUrl: "" },
      { id: 2, tag: "SITUATIONAL SATIRE", title: "WHEN YOUR REAL ESTATE AGENT HAS A SIDE JOB", videoUrl: "https://www.instagram.com/reel/DXE73PCka10/embed", sopDocUrl: "" },
      { id: 3, tag: "CULTURE SATIRE", title: "TIP CULTURE GETTING OUT OF HAND", videoUrl: "https://www.instagram.com/reel/DY7ZT8TO1U7/embed", sopDocUrl: "" },
      { id: 4, tag: "LEAD GENERATION", title: "TAKING ADVANTAGE OF EVERY OPPORTUNITY", videoUrl: "https://www.instagram.com/reel/DRSP6AHkXkw/embed", sopDocUrl: "" },
      { id: 5, tag: "PARODY NEWS", title: "OPEN HOUSE ROBBERY", videoUrl: "https://www.instagram.com/reel/DT018crEYKb/embed", sopDocUrl: "" },
      { id: 6, tag: "CLIENT RELATIONS", title: "POV: TRYING TO COACH MY ELDERLY CLIENT THROUGH DOCUSIGN", videoUrl: "https://www.instagram.com/reel/DaRPJx1AfmL/embed", sopDocUrl: "" },
      { id: 7, tag: "SKIT & HUMOR", title: "POV: WHEN THEY SAY I NEED TO LAUGH MORE", videoUrl: "https://www.instagram.com/reel/DYdsRLzM5Jx/embed", sopDocUrl: "" },
      { id: 8, tag: "LEAD QUALIFICATION", title: "SOME LEADS BE LIKE", videoUrl: "https://www.instagram.com/reel/DbBXfVkspQP/embed", sopDocUrl: "" },
      { id: 9, tag: "OPEN HOUSE SKIT", title: "IF OPEN HOUSES HAD BOUNCERS", videoUrl: "https://www.instagram.com/reel/DaqAvmuR4Wo/embed", sopDocUrl: "" },
      { id: 10, tag: "MARKET SATIRE", title: "BUYING A HOUSE IN 2026", videoUrl: "https://www.instagram.com/reel/DVZA_y_D8RQ/embed", sopDocUrl: "" },
      { id: 11, tag: "COMMISSION WARS", title: "AGENT UNDERCUT", videoUrl: "https://www.instagram.com/reel/DUotOe0DOky/embed", sopDocUrl: "" },
      { id: 12, tag: "SHOWING DISASTERS", title: "WHEN YOU DRIVE 2 HOURS TO SHOW A HOUSE", videoUrl: "https://www.instagram.com/reel/DYkRDzxKE4C/embed", sopDocUrl: "" },
      { id: 13, tag: "OPEN HOUSE REALITY", title: "POV: WHEN SOMEONE AT THE OPEN HOUSE HAS A REALTOR", videoUrl: "https://www.instagram.com/reel/DVmUbqGDF5Z/embed", sopDocUrl: "" },
      { id: 14, tag: "AGENT COMPARISON", title: "NORMAL REALTOR vs INFLUENCER SUPRA INSTALL", videoUrl: "https://www.instagram.com/reel/DYVMn0ov31n/embed", sopDocUrl: "" },
      { id: 15, tag: "SHOWING HONESTY", title: "IF REALTORS WERE HONEST AT SHOWINGS", videoUrl: "https://www.instagram.com/reel/DPJoeXXkYUi/embed", sopDocUrl: "" },
      { id: 16, tag: "LISTING HONESTY", title: "IF AGENTS WERE HONEST AT LISTING APPOINTMENTS", videoUrl: "https://www.instagram.com/reel/DPkPnU_Abxg/embed", sopDocUrl: "" },
      { id: 17, tag: "BUYER FLAKES", title: "BUYERS THE DAY BEFORE THEY COMPLETELY GHOST YOU", videoUrl: "https://www.instagram.com/reel/DPsXJxKkRQ8/embed", sopDocUrl: "" },
      { id: 18, tag: "CREATIVE MARKETING", title: "SELLING MY LISTING LIKE IT’S A PERFUME AD", videoUrl: "https://www.instagram.com/reel/DP9CMtZETZW/embed", sopDocUrl: "" },
      { id: 19, tag: "OPEN HOUSE HONESTY", title: "IF REALTORS WERE HONEST AT OPEN HOUSES", videoUrl: "https://www.instagram.com/reel/DRK9Z2GEqML/embed", sopDocUrl: "" },
      { id: 20, tag: "NEIGHBOR SATIRE", title: "OPEN HOUSE NEIGHBORS BE LIKE", videoUrl: "https://www.instagram.com/reel/DSm9t_vgpf1/embed", sopDocUrl: "" },
      { id: 21, tag: "OPEN HOUSE TOURS", title: "JUST BROWSING", videoUrl: "https://www.instagram.com/reel/DU_XdZIgdZo/embed", sopDocUrl: "" },
      { id: 22, tag: "TECH SATIRE", title: "IF ZILLOW WAS A PERSON", videoUrl: "https://www.instagram.com/reel/DVXamE-kTIv/embed", sopDocUrl: "" },
      { id: 23, tag: "GURU MATH", title: "MAKE $50M A YEAR…IT’S THAT EASY", videoUrl: "https://www.instagram.com/reel/DVtOTCCgpmk/embed", sopDocUrl: "" },
      { id: 24, tag: "SELLER ADVICE", title: "IF SELLERS MADE HOME SELLING HACK VIDEOS", videoUrl: "https://www.instagram.com/reel/DVyfwdpAjA8/embed", sopDocUrl: "" },
      { id: 25, tag: "LUXURY REALTORS", title: "LUXURY REALTORS BE LIKE", videoUrl: "https://www.instagram.com/reel/DXW06FaAlyd/embed", sopDocUrl: "" },
      { id: 26, tag: "TIME WASTERS", title: "POV: WHEN THE CLIENT CONFIRMS THEY PLAN TO WASTE YOUR TIME", videoUrl: "https://www.instagram.com/reel/DYPboCBubQg/embed", sopDocUrl: "" },
      { id: 27, tag: "PERPETUAL SHOWINGS", title: "POV: IT’S YOUR 35TH SHOWING WITH THE SAME CLIENT", videoUrl: "https://www.instagram.com/reel/DZg1c9ZoGV2/embed", sopDocUrl: "" },
      { id: 28, tag: "GEN Z PARODY", title: "POV: YOU HIRED A GEN Z REALTOR", videoUrl: "https://www.instagram.com/reel/DSOrDOnCMM1/embed", sopDocUrl: "" },
      { id: 29, tag: "TRAFFIC STOP", title: "POV: WHEN REAL ESTATE AGENTS GET PULLED OVER", videoUrl: "https://www.instagram.com/reel/DZLwR3oJ-D8/embed", sopDocUrl: "" }
    ];

    function renderGrid(data) {
      const grid = document.getElementById("reelsGrid");
      grid.innerHTML = "";

      data.forEach(item => {
        const card = document.createElement("div");
        card.className = "reel-card";
        card.innerHTML = `
          <div class="card-header">
            <span class="tag-badge">${item.tag}</span>
          </div>
          <div class="video-preview-wrapper">
            <iframe src="${item.videoUrl}" allowtransparency="true" frameborder="0" scrolling="no"></iframe>
          </div>
          <div class="card-body">
            <h3 class="reel-title">${item.title}</h3>
            <button class="sop-btn" type="button" onclick="openSOP(${item.id})" title="Open/Add Google Doc SOP">+</button>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    // SOP CLICK LOGIC: Opens link if exists; prompts to set link if empty
    function openSOP(id) {
      const item = reelsData.find(r => r.id === id);
      if (item && item.sopDocUrl && item.sopDocUrl.trim() !== "") {
        window.open(item.sopDocUrl, '_blank');
      } else {
        const newUrl = prompt(`Attach Google Doc SOP Link for: "${item ? item.title : 'Reel'}"`);
        if (newUrl && newUrl.trim() !== "") {
          if (item) item.sopDocUrl = newUrl.trim();
          alert("SOP link saved! Clicking '+' will now open your Google Doc.");
        }
      }
    }

    function handlePredictiveSearch() {
      const query = document.getElementById("searchInput").value.toLowerCase();
      const suggestionsBox = document.getElementById("searchSuggestions");
      
      if (!query) {
        suggestionsBox.style.display = "none";
        renderGrid(reelsData);
        return;
      }

      const filtered = reelsData.filter(item => 
        item.title.toLowerCase().includes(query) || 
        item.tag.toLowerCase().includes(query)
      );

      renderGrid(filtered);

      suggestionsBox.innerHTML = "";
      if (filtered.length > 0) {
        suggestionsBox.style.display = "block";
        filtered.forEach(item => {
          const div = document.createElement("div");
          div.className = "suggestion-item";
          div.innerText = `${item.title} (${item.tag})`;
          div.onclick = () => {
            document.getElementById("searchInput").value = item.title;
            suggestionsBox.style.display = "none";
            renderGrid([item]);
          };
          suggestionsBox.appendChild(div);
        });
      } else {
        suggestionsBox.style.display = "none";
      }
    }

    function openUploadModal() {
      document.getElementById("uploadModal").style.display = "flex";
    }

    function closeUploadModal() {
      document.getElementById("uploadModal").style.display = "none";
    }

    function addNewReel() {
      const title = document.getElementById("reelTitleInput").value;
      const tag = document.getElementById("reelTagInput").value || "NEW REEL";
      const videoUrl = document.getElementById("reelUrlInput").value;
      const gdocUrl = document.getElementById("gdocUrlInput").value;

      if (!title || !videoUrl) {
        alert("Please enter a title and Instagram Reel link.");
        return;
      }

      let formattedEmbed = videoUrl;
      if (!videoUrl.includes("/embed")) {
        formattedEmbed = videoUrl.split("?")[0] + "embed";
      }

      const newReel = {
        id: Date.now(),
        tag: tag.toUpperCase(),
        title: title.toUpperCase(),
        videoUrl: formattedEmbed,
        sopDocUrl: gdocUrl || ""
      };

      reelsData.unshift(newReel);
      renderGrid(reelsData);
      closeUploadModal();

      document.getElementById("reelTitleInput").value = "";
      document.getElementById("reelTagInput").value = "";
      document.getElementById("reelUrlInput").value = "";
      document.getElementById("gdocUrlInput").value = "";
    }

    renderGrid(reelsData);
  </script>
</body>
</html>
