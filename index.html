<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BUZZREELS INSPO</title>
  <style>
    /* Base Dark Theme Styling Matching Original UI */
    :root {
      --bg-color: #0b0d17;
      --card-bg: #13172b;
      --card-border: #1e2442;
      --text-main: #ffffff;
      --accent-pink: #e91e63;
      --accent-purple: #3f51b5;
      --button-bg: #282c47;
      --input-bg: #161a33;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 24px;
    }

    /* HEADER - CHANGE 1: Renamed Title */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .logo-icon {
      background: var(--accent-pink);
      border-radius: 8px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    header h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.5px;
      margin: 0;
      text-transform: uppercase;
    }

    /* CONTROL BAR */
    .control-bar {
      background-color: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
      position: relative;
    }

    /* CHANGE 2: Predictive Search Bar Container */
    .search-container {
      position: relative;
      flex: 1;
    }

    .search-input {
      width: 100%;
      background-color: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 12px 16px;
      color: #fff;
      font-size: 14px;
      box-sizing: border-box;
      outline: none;
    }

    .search-input::placeholder {
      color: #6c7293;
    }

    /* Predictive Search Dropdown */
    .search-suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 0 0 8px 8px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 100;
      display: none;
    }

    .suggestion-item {
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
      border-bottom: 1px solid var(--card-border);
    }

    .suggestion-item:hover {
      background-color: var(--input-bg);
      color: var(--accent-pink);
    }

    /* BUTTONS */
    .btn {
      border: none;
      border-radius: 8px;
      padding: 12px 20px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #fff;
      white-space: nowrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, #f06292, #e91e63);
    }

    .btn-secondary {
      background: linear-gradient(135deg, #5c6bc0, #3f51b5);
    }

    /* REELS GRID SYSTEM */
    .reels-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
    }

    /* CARD DESIGN (Kept Identical to Screenshot) */
    .reel-card {
      background-color: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .card-header {
      padding: 12px 16px;
    }

    .tag-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 4px 8px;
      border-radius: 12px;
      background: rgba(233, 30, 99, 0.2);
      color: var(--accent-pink);
      text-transform: uppercase;
      display: inline-block;
    }

    .video-preview {
      width: 100%;
      height: 480px;
      background-color: #000;
      position: relative;
    }

    .video-preview iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .card-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .reel-title {
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      margin: 0;
      line-height: 1.3;
    }

    .sop-btn {
      width: 100%;
      background-color: var(--button-bg);
      border: 1px solid var(--card-border);
      color: #9fa8da;
      padding: 12px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      box-sizing: border-box;
    }

    .sop-btn:hover {
      background-color: #323759;
      color: #fff;
    }

    /* MODAL FOR GOOGLE DOC / REEL UPLOAD */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-box {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .modal-box h3 { margin: 0; }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 12px;
      color: #9fa8da;
    }

    .form-group input {
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      padding: 10px;
      color: #fff;
    }
  </style>
</head>
<body>

  <!-- CHANGE 1: Updated Dashboard Title -->
  <header>
    <div class="logo-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
        <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
      </svg>
    </div>
    <h1>BUZZREELS INSPO</h1>
  </header>

  <!-- CONTROLS -->
  <div class="control-bar">
    <!-- CHANGE 2: Added Predictive Search Bar -->
    <div class="search-container">
      <input type="text" id="searchInput" class="search-input" placeholder="Search reels, concepts, or SOP keywords..." onkeyup="handlePredictiveSearch()">
      <div id="searchSuggestions" class="search-suggestions"></div>
    </div>

    <!-- CHANGE 3: Upload New Reel (with Google Doc Link Support) -->
    <button class="btn btn-primary" onclick="openUploadModal()">
      <span>+</span> Add Reel / Upload SOP
    </button>
  </div>

  <!-- REELS LIBRARY GRID -->
  <div class="reels-grid" id="reelsGrid">
    <!-- Cards render dynamically via JavaScript -->
  </div>

  <!-- UPLOAD MODAL FOR GOOGLE DOC & REEL ADDITION -->
  <div id="uploadModal" class="modal-overlay">
    <div class="modal-box">
      <h3>Upload New Reel & SOP</h3>
      <div class="form-group">
        <label>Reel Title</label>
        <input type="text" id="reelTitleInput" placeholder="e.g. IF AGENTS WERE HONEST">
      </div>
      <div class="form-group">
        <label>Category Tag</label>
        <input type="text" id="reelTagInput" placeholder="e.g. HONEST REAL ESTATE VIDEO">
      </div>
      <div class="form-group">
        <label>Instagram Reel URL</label>
        <input type="text" id="reelUrlInput" placeholder="https://www.instagram.com/reel/...">
      </div>
      <div class="form-group">
        <label>Google Doc SOP Link (Upload SOP)</label>
        <input type="text" id="gdocUrlInput" placeholder="https://docs.google.com/document/d/...">
      </div>
      <div style="display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px;">
        <button class="btn" style="background: #444;" onclick="closeUploadModal()">Cancel</button>
        <button class="btn btn-primary" onclick="addNewReel()">Save to Library</button>
      </div>
    </div>
  </div>

  <script>
    // Initial Library State
    let reelsData = [
      {
        id: 1,
        tag: "HONEST REAL ESTATE VIDEO",
        title: "If Real Estate Videos Were Honest",
        videoUrl: "https://www.instagram.com/reel/C-12345/embed",
        sopDocUrl: "#"
      },
      {
        id: 2,
        tag: "SITUATIONAL SATIRE",
        title: "WHEN YOUR REAL ESTATE AGENT HAS A SIDE JOB",
        videoUrl: "https://www.instagram.com/reel/C-67890/embed",
        sopDocUrl: "#"
      }
    ];

    // Render Cards to Library Grid
    function renderGrid(data) {
      const grid = document.getElementById("reelsGrid");
      grid.innerHTML = "";

      data.forEach(item => {
        const card = document.createElement("div");
        card.className = "reel-card";
        card.innerHTML = `
          <div class="card-header">
            <span class="tag-badge">${item.tag}</span>
          </div>
          <div class="video-preview">
            <iframe src="${item.videoUrl}" allowtransparency="true" frameborder="0" scrolling="no"></iframe>
          </div>
          <div class="card-body">
            <h3 class="reel-title">${item.title}</h3>
            <a href="${item.sopDocUrl}" target="_blank" class="sop-btn">
              📄 Open Full SOP Breakdown
            </a>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    // CHANGE 2: Predictive Search Bar Logic
    function handlePredictiveSearch() {
      const query = document.getElementById("searchInput").value.toLowerCase();
      const suggestionsBox = document.getElementById("searchSuggestions");
      
      if (!query) {
        suggestionsBox.style.display = "none";
        renderGrid(reelsData);
        return;
      }

      // Filter Data
      const filtered = reelsData.filter(item => 
        item.title.toLowerCase().includes(query) || 
        item.tag.toLowerCase().includes(query)
      );

      // Render Filtered Cards
      renderGrid(filtered);

      // Render Predictive Search Dropdown Suggestions
      suggestionsBox.innerHTML = "";
      if (filtered.length > 0) {
        suggestionsBox.style.display = "block";
        filtered.forEach(item => {
          const div = document.createElement("div");
          div.className = "suggestion-item";
          div.innerText = `${item.title} (${item.tag})`;
          div.onclick = () => {
            document.getElementById("searchInput").value = item.title;
            suggestionsBox.style.display = "none";
            renderGrid([item]);
          };
          suggestionsBox.appendChild(div);
        });
      } else {
        suggestionsBox.style.display = "none";
      }
    }

    // CHANGE 3: Upload Modal Open/Close & Add Logic
    function openUploadModal() {
      document.getElementById("uploadModal").style.display = "flex";
    }

    function closeUploadModal() {
      document.getElementById("uploadModal").style.display = "none";
    }

    function addNewReel() {
      const title = document.getElementById("reelTitleInput").value;
      const tag = document.getElementById("reelTagInput").value || "NEW REEL";
      const videoUrl = document.getElementById("reelUrlInput").value;
      const gdocUrl = document.getElementById("gdocUrlInput").value;

      if (!title || !videoUrl) {
        alert("Please provide at least a title and Instagram video URL.");
        return;
      }

      // Format URL for Instagram embed if necessary
      let formattedEmbed = videoUrl;
      if (!videoUrl.includes("/embed")) {
        formattedEmbed = videoUrl.split("?")[0] + "embed";
      }

      const newReel = {
        id: Date.now(),
        tag: tag.toUpperCase(),
        title: title,
        videoUrl: formattedEmbed,
        sopDocUrl: gdocUrl || "#"
      };

      reelsData.unshift(newReel);
      renderGrid(reelsData);
      closeUploadModal();

      // Clear inputs
      document.getElementById("reelTitleInput").value = "";
      document.getElementById("reelTagInput").value = "";
      document.getElementById("reelUrlInput").value = "";
      document.getElementById("gdocUrlInput").value = "";
    }

    // Initial Load
    renderGrid(reelsData);
  </script>
</body>
</html>
