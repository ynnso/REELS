    <style>

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; padding: 30px 20px; }

        header { max-width: 1400px; margin: 0 auto 24px auto; display: flex; align-items: center; gap: 12px; }
        .brand-icon { width: 42px; height: 42px; background: var(--accent-gradient); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #fff; }
        .brand h1 { font-size: 1.5rem; font-weight: 800; }

        .reel-control-bar { max-width: 1400px; margin: 0 auto 30px auto; background: var(--bg-card); border: 1px solid var(--border-color); padding: 16px; border-radius: 16px; display: flex; gap: 12px; }
        .input-field { flex: 1; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-color); color: var(--text-main); padding: 12px 16px; border-radius: 10px; outline: none; font-size: 0.88rem; }

        .reels-grid { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 32px; justify-items: center; }
        
        /* Clean Playable Video Card */
        .phone-card { width: 340px; background: #000; border-radius: 20px; border: 2px solid #1f2937; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 10px 25px rgba(0,0,0,0.5); transition: border-color 0.3s ease; }
        .phone-card:hover { border-color: #ec4899; }
        .card-header { padding: 12px 16px; background: var(--bg-card); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .category-badge { background: rgba(236, 72, 153, 0.25); color: #ec4899; padding: 4px 10px; border-radius: 12px; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; }
        
        /* Cropped Video Container - Edge-to-edge video display */
        .video-crop-container { width: 100%; height: 460px; position: relative; overflow: hidden; background: #000; }
        .clean-iframe { position: absolute; top: -58px; left: -5%; width: 110%; height: 580px; border: none; background: #000; }

        /* Modal Phone View Container */
        .modal-video-crop-container { width: 100%; height: 580px; position: relative; overflow: hidden; background: #000; border-radius: 12px; }
        .modal-clean-iframe { position: absolute; top: -60px; left: -5%; width: 110%; height: 710px; border: none; background: #000; }
        
        .card-footer { padding: 14px 16px; background: var(--bg-card); border-top: 1px solid var(--border-color); }
        .card-title { font-size: 1.05rem; font-weight: 700; color: #fff; }
        .open-details-btn { margin-top: 12px; background: rgba(167, 139, 250, 0.15); color: var(--accent-purple); border: 1px solid rgba(167, 139, 250, 0.4); width: 100%; padding: 11px; border-radius: 10px; font-size: 0.82rem; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: all 0.2s ease; }
        .open-details-btn:hover { background: var(--accent-purple); color: #000; }

        /* Modal Player Overlay */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.94); backdrop-filter: blur(12px); z-index: 100; display: none; justify-content: center; align-items: center; padding: 20px; }
        .modal-body { background: var(--bg-card); border: 1px solid var(--border-color); width: 100%; max-width: 1150px; height: 90vh; border-radius: 24px; display: flex; overflow: hidden; position: relative; }
        .modal-phone-view { width: 400px; background: #000; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; border-right: 1px solid var(--border-color); flex-shrink: 0; padding: 16px; overflow-y: auto; }
        .modal-sop-details { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .close-modal-btn { position: absolute; top: 16px; right: 16px; background: rgba(255, 255, 255, 0.1); border: none; color: #fff; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }

        .sop-heading { font-size: 1rem; font-weight: 700; color: var(--accent-purple); display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .link-box { background: rgba(255, 255, 255, 0.04); border: 1px solid var(--border-color); padding: 12px 16px; border-radius: 12px; display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
        .link-box a { color: #60a5fa; font-size: 0.82rem; word-break: break-all; text-decoration: underline; font-weight: 600; line-height: 1.4; }

        .script-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; margin-top: 8px; border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; }
        .script-table th { background: rgba(255, 255, 255, 0.05); padding: 10px; text-align: left; color: var(--text-muted); }
        .script-table td { padding: 10px; border-top: 1px solid var(--border-color); vertical-align: top; }
        .sop-list { padding-left: 18px; color: var(--text-muted); font-size: 0.88rem; line-height: 1.6; }

        .btn-ui { background: var(--accent-gradient); color: #fff; border: none; padding: 12px 20px; border-radius: 20px; font-weight: 700; font-size: 0.85rem; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; text-decoration: none; }
        .toast { position: fixed; bottom: 24px; right: 24px; background: var(--accent-gradient); color: #fff; padding: 12px 24px; border-radius: 30px; font-weight: 700; display: none; z-index: 200; }
    </style>
</head>

        // Init Lucide
        lucide.createIcons();

        // Render Cards
        function renderCards() {
            const grid = document.getElementById('reelsGrid');
            grid.innerHTML = reelDatabase.map(reel => `
                <div class="phone-card">
                    <div class="card-header">
                        <span class="category-badge">${reel.category}</span>
                    </div>
                    <div class="video-crop-container">
                        <iframe class="clean-iframe" src="${reel.embedUrl}" loading="lazy" allowfullscreen frameborder="0"></iframe>
                    </div>
                    <div class="card-footer">
                        <div class="card-title">${reel.title}</div>
                        <button class="open-details-btn" onclick="openReelModal('${reel.id}')">
                            <i data-lucide="file-text" size="16"></i> Open Full SOP Breakdown
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // Open Modal Breakdown
        function openReelModal(id) {
            const reel = reelDatabase.find(r => r.id === id);
            if (!reel) return;

            document.getElementById('modalEmbedIframe').src = reel.embedUrl;
            document.getElementById('modalExternalLink').href = reel.fullReelUrl;

            const tableRows = reel.table ? reel.table.map(row => `
                <tr>
                    <td><strong>${row.time}</strong></td>
                    <td>${row.shot}</td>
                    <td><code>${row.overlay}</code></td>
                    <td>${row.audio}</td>
                </tr>
            `).join('') : '';

            const sopHTML = `
                <div>
                    <span class="category-badge">${reel.category}</span>
                    <h2 style="font-size: 1.6rem; margin-top: 4px; font-weight: 800;">${reel.title}</h2>
                    <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 4px;">${reel.hook}</p>
                </div>

                <div class="link-box">
                    <span style="font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700;">Direct Reel Link</span>
                    <a href="${reel.fullReelUrl}" target="_blank">${reel.fullReelUrl}</a>
                </div>

                <div>
                    <div class="sop-heading"><i data-lucide="target" size="16"></i> Core Strategic Objective</div>
                    <p style="font-size: 0.88rem; color: var(--text-muted); line-height: 1.5;">${reel.coreObjective}</p>
                </div>

                <div>
                    <div class="sop-heading"><i data-lucide="brain" size="16"></i> Psychology & Hook Mechanics</div>
                    <ul class="sop-list">
                        ${reel.psychology.map(p => `<li>${p}</li>`).join('')}
                    </ul>
                </div>

                <div>
                    <div class="sop-heading"><i data-lucide="sliders" size="16"></i> On-Site Setup & Specs</div>
                    <p style="font-size: 0.82rem; color: var(--accent-purple); font-weight: 700; margin-bottom: 6px;">Format: ${reel.targetLength}</p>
                    <p style="font-size: 0.82rem; color: var(--text-muted); margin-bottom: 8px;"><strong>Fixed Banner:</strong> ${reel.bannerOverlayText}</p>
                    <ul class="sop-list">
                        ${reel.setup.map(s => `<li>${s}</li>`).join('')}
                    </ul>
                </div>

                <div>
                    <div class="sop-heading"><i data-lucide="list" size="16"></i> Scene-by-Scene Script Breakdown</div>
                    <table class="script-table">
                        <thead>
                            <tr>
                                <th style="width: 15%;">Time</th>
                                <th style="width: 30%;">Shot / Action</th>
                                <th style="width: 20%;">Overlay Text</th>
                                <th style="width: 35%;">Audio / Voice</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${tableRows}
                        </tbody>
                    </table>
                </div>

                <div>
                    <div class="sop-heading"><i data-lucide="scissors" size="16"></i> Post-Production & Loop Notes</div>
                    <ul class="sop-list">
                        ${reel.postProduction.map(p => `<li>${p}</li>`).join('')}
                    </ul>
                </div>

                <div>
                    <div class="sop-heading"><i data-lucide="message-square" size="16"></i> Engagement Strategy</div>
                    <p style="font-size: 0.88rem; color: var(--text-muted); margin-bottom: 6px;"><strong>Pinned Comment:</strong> ${reel.pinnedComment}</p>
                    <p style="font-size: 0.82rem; color: var(--accent-purple);">${reel.hashtags}</p>
                </div>

                <div style="margin-top: 10px;">
                    <button class="btn-main" style="width: 100%; justify-content: center;" onclick="copySOPToClipboard('${reel.id}')">
                        <i data-lucide="copy" size="16"></i> Copy SOP to Clipboard
                    </button>
                </div>
            `;

            document.getElementById('modalSopDetails').innerHTML = sopHTML;
            document.getElementById('reelModal').style.display = 'flex';
            lucide.createIcons();
        }

        // Close Modal
        function closeReelModal() {
            document.getElementById('reelModal').style.display = 'none';
            document.getElementById('modalEmbedIframe').src = '';
        }

        // Copy SOP Content
        function copySOPToClipboard(id) {
            const reel = reelDatabase.find(r => r.id === id);
            if (!reel) return;

            const text = `SOP: ${reel.title}\nCategory: ${reel.category}\nLink: ${reel.fullReelUrl}\n\nObjective: ${reel.coreObjective}\n\nFormat: ${reel.targetLength}\nBanner: ${reel.bannerOverlayText}\n\nPinned Comment: ${reel.pinnedComment}\nHashtags: ${reel.hashtags}`;
            
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                toast.style.display = 'block';
                setTimeout(() => { toast.style.display = 'none'; }, 2500);
            });
        }

        // Add Reel via Link Input
        function addReelFromLink() {
            const input = document.getElementById('addUrl');
            const url = input.value.trim();
            if (!url) return;

            const match = url.match(/reel\/([A-Za-z0-9_-]+)/) || url.match(/p\/([A-Za-z0-9_-]+)/);
            const shortcode = match ? match[1] : null;

            if (!shortcode) {
                alert('Please enter a valid Instagram Reel URL.');
                return;
            }

            const newReel = {
                id: 'custom-' + Date.now(),
                category: 'CUSTOM REEL',
                title: 'Custom Imported Reel',
                hook: 'HOOK: Newly added custom Instagram reel.',
                fullReelUrl: url,
                embedUrl: `https://www.instagram.com/p/${shortcode}/embed/`,
                coreObjective: 'Custom reel imported for strategy analysis and breakdown.',
                psychology: ['Custom strategy analysis needed.'],
                setup: ['Standard smartphone 9:16 vertical video recording setup.'],
                targetLength: 'Vertical 9:16',
                bannerOverlayText: 'Custom Reel Banner',
                table: [
                    { time: '0:00-End', shot: 'Full Scene', overlay: 'CUSTOM', audio: 'Original Audio' }
                ],
                postProduction: ['Standard jump cuts', 'Audio normalization'],
                pinnedComment: 'What do you think of this video? 👇',
                hashtags: '#realestate #realtorlife #realestateagent'
            };

            reelDatabase.unshift(newReel);
            renderCards();
            input.value = '';
        }

        // Initial Page Render
        renderCards();
    </script>
