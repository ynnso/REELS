        function closeReelModal() {
            document.getElementById('reelModal').style.display = 'none';
            document.getElementById('modalEmbedIframe').src = '';
        }

        function copySOPToClipboard(id) {
            const reel = reelDatabase.find(r => r.id === id);
            if (!reel) return;

            const text = `SOP: ${reel.title}\nCategory: ${reel.category}\nLink: ${reel.fullReelUrl}\n\nObjective: ${reel.coreObjective}\n\nFormat: ${reel.targetLength}\nBanner: ${reel.bannerOverlayText}\n\nPinned Comment: ${reel.pinnedComment}\nHashtags: ${reel.hashtags}`;
            
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                toast.style.display = 'block';
                setTimeout(() => { toast.style.display = 'none'; }, 2500);
            });
        }

        function addReelFromLink() {
            const input = document.getElementById('addUrl');
            const url = input.value.trim();
            if (!url) return;

            const match = url.match(/reel\/([A-Za-z0-9_-]+)/) || url.match(/p\/([A-Za-z0-9_-]+)/);
            const shortcode = match ? match[1] : null;

            if (!shortcode) {
                alert('Please enter a valid Instagram Reel URL.');
                return;
            }

            const newReel = {
                id: 'custom-' + Date.now(),
                category: 'CUSTOM REEL',
                title: 'Custom Imported Reel',
                hook: 'HOOK: Newly added custom Instagram reel.',
                fullReelUrl: url,
                embedUrl: `https://www.instagram.com/p/${shortcode}/embed/`,
                coreObjective: 'Custom reel imported for strategy analysis and breakdown.',
                psychology: ['Custom strategy analysis needed.'],
                setup: ['Standard smartphone 9:16 vertical video recording setup.'],
                targetLength: 'Vertical 9:16',
                bannerOverlayText: 'Custom Reel Banner',
                table: [
                    { time: '0:00-End', shot: 'Full Scene', overlay: 'CUSTOM', audio: 'Original Audio' }
                ],
                postProduction: ['Standard jump cuts', 'Audio normalization'],
                pinnedComment: 'What do you think of this video? 👇',
                hashtags: '#realestate #realtorlife #realestateagent'
            };

            reelDatabase.unshift(newReel);
            renderCards();
            input.value = '';
        }

        renderCards();
    </script>
</body>
</html>
