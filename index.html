<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Reels Database</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --table-header: #0f172a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            line-height: 1.5;
        }

        header {
            max-width: 1200px;
            margin: 0 auto 2rem auto;
            text-align: center;
        }

        h1 {
            color: var(--accent);
            font-size: 2.25rem;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        #reels-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
        }

        .reel-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .category-badge {
            display: inline-block;
            background-color: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            font-size: 0.8rem;
            font-weight: 700;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .reel-title {
            font-size: 1.5rem;
            margin: 0 0 0.5rem 0;
        }

        .hook-box {
            background-color: rgba(0, 0, 0, 0.2);
            border-left: 4px solid var(--accent);
            padding: 0.75rem 1rem;
            font-style: italic;
            margin-bottom: 1rem;
            border-radius: 0 6px 6px 0;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
            background: rgba(255, 255, 255, 0.02);
            padding: 1rem;
            border-radius: 8px;
        }

        .meta-item strong {
            color: var(--accent);
            display: block;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .section-title {
            font-size: 1.1rem;
            color: var(--accent);
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.25rem;
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
        }

        ul {
            padding-left: 1.25rem;
            margin: 0 0 1rem 0;
        }

        li {
            margin-bottom: 0.25rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            font-size: 0.9rem;
        }

        th, td {
            border: 1px solid var(--border);
            padding: 0.75rem;
            text-align: left;
            vertical-align: top;
        }

        th {
            background-color: var(--table-header);
            color: var(--accent);
            font-weight: 600;
        }

        tr:nth-child(even) {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .audio-cell {
            white-space: pre-line;
        }

        .tags-container {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .hashtag {
            color: var(--accent);
            font-size: 0.85rem;
        }

        .links {
            margin-top: 1rem;
        }

        .links a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>

                </div>
            `;

            container.appendChild(card);
        });
    </script>
