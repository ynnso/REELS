<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Reels SOP Library</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --accent-hover: #0284c7;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --table-header: #0f172a;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem 1rem;
            line-height: 1.5;
        }

        header {
            max-width: 1200px;
            margin: 0 auto 2rem auto;
            text-align: center;
        }

        h1 {
            color: var(--accent);
            font-size: 2.25rem;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Nav & Action Buttons */
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background-color: var(--card-bg);
            color: var(--accent);
            border: 1px solid var(--border);
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 1.5rem;
            transition: all 0.2s ease;
        }

        .btn-back:hover {
            background-color: var(--border);
            color: #fff;
        }

        .btn-primary {
            display: inline-block;
            background-color: var(--accent);
            color: var(--bg-color);
            font-weight: 700;
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.2s ease;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
            color: #fff;
        }

        /* Main Grid (Library View) */
        .reels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .grid-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s ease, border-color 0.2s ease;
            cursor: pointer;
        }

        .grid-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
        }

        /* Detail View (SOP Page) */
        #sop-detail-view {
            display: none;
        }

        .sop-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .category-badge {
            display: inline-block;
            background-color: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            font-size: 0.8rem;
            font-weight: 700;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .reel-title {
            font-size: 1.75rem;
            margin: 0 0 0.5rem 0;
        }

        .hook-box {
            background-color: rgba(0, 0, 0, 0.2);
            border-left: 4px solid var(--accent);
            padding: 0.75rem 1rem;
            font-style: italic;
            margin: 1rem 0;
            border-radius: 0 6px 6px 0;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin: 1.5rem 0;
            background: rgba(255, 255, 255, 0.02);
            padding: 1rem;
            border-radius: 8px;
        }

        .meta-item strong {
            color: var(--accent);
            display: block;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .section-title {
            font-size: 1.2rem;
            color: var(--accent);
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.25rem;
            margin-top: 2rem;
            margin-bottom: 0.75rem;
        }

        ul {
            padding-left: 1.25rem;
            margin: 0 0 1rem 0;
        }

        li {
            margin-bottom: 0.35rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            font-size: 0.9rem;
        }

        th, td {
            border: 1px solid var(--border);
            padding: 0.75rem;
            text-align: left;
            vertical-align: top;
        }

        th {
            background-color: var(--table-header);
            color: var(--accent);
            font-weight: 600;
        }

        tr:nth-child(even) {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .audio-cell {
            white-space: pre-line;
        }

        .tags-container {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .hashtag {
            color: var(--accent);
            font-size: 0.85rem;
        }

        .links {
            margin-top: 1.5rem;
        }

        .links a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <header>
        <h1>Real Estate Reels Database</h1>
        <p class="subtitle">Main Video Library & Detailed SOP Playbooks</p>
    </header>

    <div class="container">
        <!-- VIEW 1: MAIN LIBRARY GRID -->
        <main id="library-view">
            <div class="reels-grid" id="reels-grid-container">
                <!-- Javascript populates library cards here -->
            </div>
        </main>

        <!-- VIEW 2: SOP DETAIL PAGE -->
        <main id="sop-detail-view">
            <button class="btn-back" onclick="showLibrary()">← Back to Reel Library</button>
            <div id="sop-content" class="sop-card">
                <!-- Javascript populates selected SOP breakdown here -->
            </div>
        </main>
    </div>

    <script>
        const reelDatabase = [
            {
                id: 'honest-video',
                category: 'HONEST REAL ESTATE VIDEO',
                title: 'If Real Estate Videos Were Honest',
                hook: "HOOK: 'It's not my listing... but I'm going to make it look like it is.'",
                fullReelUrl: 'https://www.instagram.com/reel/DOUWDbcEj1Z/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA==',
                coreObjective: 'Drive top-of-funnel reach, high engagement, and client trust through radical transparency, meta-humor, and seamless loop mechanics.',
                psychology: [
                    'Subversive Meta-Humor: Breaks the fourth wall by admitting industry tropes. Radical self-deprecation immediately builds authenticity.',
                    'Persistent Visual Anchor: A fixed top banner maintains full context for silent scrollers.',
                    'Rapid Pattern Breaks: High-velocity visual switches every 3 seconds prevent visual fatigue.',
                    'Infinite Audio Loop: Cutting abruptly on your name feeds directly back to Shot 1.'
                ],
                setup: [
                    'Location: A high-end property with diverse visual environments.',
                    'Audio: Wireless lapel microphone for voice-isolated audio.',
                    'Visual Styling: Fixed top banner (If real estate videos were honest).'
                ],
                targetLength: '22 Seconds | Aspect Ratio: Vertical 9:16',
                bannerOverlayText: 'If real estate videos were honest',
                table: [
                    { time: "0:00–0:03", shot: "Shot 1 (Hook): Walking down driveway with open hands.", overlay: "NOT MY LISTING", audio: "\"It's not my listing... but I'm going to make it look like it is.\"" },
                    { time: "0:03–0:06", shot: "Shot 2 (Pivot): Standing in entryway gesturing proud movements.", overlay: "ALL ABOUT ME", audio: "\"This video isn't about the house. It's about me—well, a version that appeals to you.\"" },
                    { time: "0:06–0:09", shot: "Shot 3 (B-Roll 1): Hand gliding over marble countertop.", overlay: "CARESSING COUNTERTOPS", audio: "\"A version that strolls aimlessly caressing countertops...\"" },
                    { time: "0:09–0:12", shot: "Shot 4 (B-Roll 2): Kneeling in kitchen, opening oven door.", overlay: "EXPERT MODE", audio: "\"...and pretends to be knowledgeable about technical details I know nothing about.\"" },
                    { time: "0:12–0:15", shot: "Shot 5 (B-Roll 3): Bathroom mirror shot, splashing water.", overlay: "NOT HUNGOVER", audio: "\"...a version that doesn't look exhausted or hungover.\"" },
                    { time: "0:15–0:19", shot: "Shot 6 (The Stat): Sitting at island talking into lens.", overlay: "70% SOCIAL MEDIA", audio: "\"I spend 70% of my time on social media... My actual production is tiny.\"" },
                    { time: "0:19–0:22", shot: "Shot 7 (The Close): Sitting in porch rocking chair.", overlay: "CHOICE IS CLEAR", audio: "\"So do you want an overly salesy guru... Hi, I'm [Name]—\" [Cut]" }
                ],
                postProduction: [
                    'Tight Jump-Cuts: Trim all micro-pauses between sentences.',
                    'Captions: Animated word pop-up captions in yellow/white.',
                    'Audio Mixing: Voiceover at 0dB, background music at -22dB.',
                    'Seamless Loop: Trim mid-word on name to connect seamlessly into Shot 1.'
                ],
                pinnedComment: 'Be honest: How many real estate videos have you swiped past today? 😂👇',
                hashtags: '#realestatehumor #realestatetips #realestateagent #realtorlife'
            },
            {
                id: 'side-job',
                category: 'SITUATIONAL SATIRE',
                title: 'When Your Real Estate Agent Has A Side Job',
                hook: "HOOK: Driver: 'Hey, welcome in!' Passenger: 'Heading home.' Driver: 'You own or rent?'",
                fullReelUrl: 'https://www.instagram.com/reel/DXE73PCka10/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA==',
                coreObjective: 'Captive audience dynamic inside rideshare driving engagement with high relatable satire.',
                psychology: [
                    'Relatable Satire: Plays into the meme that everyone is a real estate agent.',
                    'Captive Audience Dynamic: Rideshare setting creates natural comedic tension.',
                    'POV Immersion: Filmed over driver\'s shoulder for immediate passenger perspective.'
                ],
                setup: [
                    'Equipment: Smartphone, dashboard mount, lapel mic.',
                    'Location: Drive through suburban neighborhood with For Sale signs.',
                    'Camera Angle: Placed in back seat angled over right shoulder.'
                ],
                targetLength: '1 Minute 11 Seconds | Vertical 9:16',
                bannerOverlayText: 'When you\'re a real estate agent with a side job',
                table: [
                    { time: "0:00–0:06", shot: "Shot 1 (Hook): Backseat POV over shoulder.", overlay: "WHERE WE HEADED?", audio: "Driver: \"Hey, welcome in!\"\nPassenger: \"Heading home.\"\nDriver: \"You own or rent?\"" },
                    { time: "0:06–0:14", shot: "Shot 2 (The Pitch): Driver looks back in mirror.", overlay: "QUICK STOP", audio: "Passenger: \"Renting for now.\"\nDriver: \"Need to make a quick stop... it's on the way.\"" },
                    { time: "0:14–0:22", shot: "Shot 3 (Drive-By Tour 1): Pan to suburban home.", overlay: "3 BED / 2 BATH", audio: "Driver: \"I think you'll like this one! 3-bedroom, 2.5-bath under 3,000 sq ft.\"" },
                    { time: "0:22–0:36", shot: "Shot 4 (The Pushback): Driver turns around at stop sign.", overlay: "INTEREST RATES?", audio: "Passenger: \"I'm just trying to go home.\"\nDriver: \"Have you been keeping up with interest rates?\"" },
                    { time: "0:36–0:48", shot: "Shot 5 (Drive-By Tour 2): Pan out window to second house.", overlay: "HOUSE #2", audio: "Driver: \"Look at this one right here—4 beds, 3 baths, fully updated!\"" },
                    { time: "0:48–1:11", shot: "Shot 6 (Rejection & Loop): Passenger exits vehicle.", overlay: "LET ME OUT", audio: "Driver: \"How's 10:00 AM tomorrow for a showing?\"\nPassenger: \"Just let me out.\"\n(Door slams -> Cut)" }
                ],
                postProduction: [
                    'Text Overlay: Fixed top banner with clear black text on white.',
                    'Audio Mixing: Driver at 0dB, passenger slightly muffled.',
                    'Loop Point: Cut on door slam back to 0:00.'
                ],
                pinnedComment: 'Would you be mad or impressed if your Uber driver pulled this? 😂👇',
                hashtags: '#realestateagent #realtorlife #uberhumor #sidehustle'
            },
            {
                id: 'tip-culture',
                category: 'TRENDING SATIRE',
                title: 'Tip Culture Getting Out Of Hand',
                hook: "HOOK: Buyer: 'Thanks for showing the house!' Agent: 'My pleasure! Just sign out on the screen real quick.'",
                fullReelUrl: 'https://www.instagram.com/reel/DY7ZT8TO1U7/?utm_source=&igsh=MzRlODBiNWFlZA==ig_web_copy_link',
                coreObjective: 'Combine tip culture fatigue with real estate high stakes to create high engagement and viral debate.',
                psychology: [
                    'Cultural Rage Wave: Capitalizes on universal tip culture fatigue.',
                    'Inner Monologue: Creates comedic tension and maintains flat retention.',
                    'Absurd Prop Visual: iPad showing 18% ($153,000) tip forces pauses/replays.'
                ],
                setup: [
                    'Tablet Prop: Canva slide displaying 18%, 20%, 22% tip options on an $850k purchase.',
                    'Location: Front doorway/porch of a listing.',
                    'Audio: Reverb effect added on inner monologue dialogue.'
                ],
                targetLength: '25 Seconds | Vertical 9:16',
                bannerOverlayText: 'Tip Culture is Getting Out of Hand 💳',
                table: [
                    { time: "0:00–0:03", shot: "Shot 1 (Hook): Buyer exits, agent presents iPad.", overlay: "SIGN OUT PLEASE", audio: "Buyer: \"Thanks for showing the house!\"\nAgent: \"My pleasure! Just sign out real quick.\"" },
                    { time: "0:03–0:06", shot: "Shot 2 (Screen Insert): Close up on iPad tip choices.", overlay: "ADD A TIP?", audio: "(Awkward pause as camera zooms on screen)" },
                    { time: "0:06–0:10", shot: "Shot 3 (Buyer Reaction): Staring in disbelief.", overlay: "AT AN OPEN HOUSE?!", audio: "Buyer (Inner Monologue): \"Wait a minute... tips at an open house?!\"" },
                    { time: "0:10–0:15", shot: "Shot 4 (Agent Reaction): Looking away nervously.", overlay: "STAY COOL", audio: "Agent (Inner Monologue): \"Oh man, she's actually thinking about doing it...\"" },
                    { time: "0:15–0:19", shot: "Shot 5 (Buyer Dilemma): Biting lip in internal struggle.", overlay: "$153,000 TIP", audio: "Buyer (Inner Monologue): \"I don't want to look cheap... but 18% is $153,000!\"" },
                    { time: "0:19–0:24", shot: "Shot 6 (The Climax): Tapping disabled button.", overlay: "NO TIP DISABLED", audio: "Agent (Inner Monologue): \"You removed the 'no tip' button... oh god she tapped it!\"" },
                    { time: "0:24–0:27", shot: "Shot 7 (Exit & Loop): Stomping down porch stairs.", overlay: "OUTTA HERE", audio: "Buyer: \"Okay, all set!\"\n(Stomps down steps -> Cut)" }
                ],
                postProduction: [
                    'Audio Effect: Reverb/echo on inner monologue thoughts.',
                    'Captions: Highlighted lower-third word pop-ups.',
                    'Loop Stitching: Cut on step impact to auto-loop continuous action.'
                ],
                pinnedComment: 'Be honest... if you saw \'No Tip (Not an Option)\' at an open house, what are you doing? 😂👇',
                hashtags: '#tipculture #realestatehumor #openhouse #realtorlife'
            },
            {
                id: 'every-opportunity',
                category: 'SITUATIONAL SATIRE',
                title: 'Taking Advantage Of Every Opportunity',
                hook: "HOOK: (Car horn honks) Agent: 'Keep coming! You're good, you're good! Stop!'",
                fullReelUrl: 'https://www.instagram.com/reel/DRSP6AHkXkw/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA==',
                coreObjective: 'Use physical comedy and hyper-local targeting to drive massive shares and brand awareness.',
                psychology: [
                    'Bait-and-Switch Hook: Starts as driveway help, shifts to aggressive real estate pitch.',
                    'Physical Slapstick: Hand gestures, running up to window, force-sliding business cards.',
                    'Hyper-Local Targeting: Names specific local towns to increase local shares.'
                ],
                setup: [
                    'Equipment: Smartphone, physical business cards.',
                    'Location: Residential driveway.',
                    'Audio: Wireless lapel mic for clear outdoor speech.'
                ],
                targetLength: '18 Seconds | Vertical 9:16',
                bannerOverlayText: 'Taking advantage at every opportunity... 🚗',
                table: [
                    { time: "0:00–0:03", shot: "Shot 1 (Hook): Windshield POV guiding driver.", overlay: "COMING IN HOT 🚘", audio: "(Car horn honks)\nAgent: \"Keep coming! You're good, you're good! Stop!\"" },
                    { time: "0:03–0:06", shot: "Shot 2 (The Approach): Pulling out business card.", overlay: "MEET BLAKE 📇", audio: "Agent: \"Hey! I'm Blake Shults with ARC Realty.\"" },
                    { time: "0:06–0:12", shot: "Shot 3 (Rapid Pitch): Talking at 1.2x speed.", overlay: "HOOVER NATIVE 🏠", audio: "Agent: \"Are you looking to buy or sell a house in Bluff Park? I'm a Hoover native!\"" },
                    { time: "0:12–0:17", shot: "Shot 4 (Card Slide & Loop): Pushing card through window crack.", overlay: "TAKE MY CARD 💳", audio: "Agent: \"I'd love to earn your business! Here's my card—\"\n(Window rolls up -> Cut)" }
                ],
                postProduction: [
                    'SFX: Car horn at 0:00 and mechanical window sound.',
                    'Captions: Rapid pop-up keywords.',
                    'Loop Stitch: Cut mid-sentence right as card pushes into window gap.'
                ],
                pinnedComment: 'If I guided you into a tight parking spot, would you let me list your house? 😂👇',
                hashtags: '#realestatehumor #realtorlife #listingagent #realestateagent'
            }
        ];

        // Render Main Library Grid
        function renderLibrary() {
            const gridContainer = document.getElementById('reels-grid-container');
            gridContainer.innerHTML = reelDatabase.map(reel => `
                <div class="grid-card" onclick="openSOP('${reel.id}')">
                    <div>
                        <span class="category-badge">${reel.category}</span>
                        <h2 style="font-size: 1.3rem; margin: 0.5rem 0;">${reel.title}</h2>
                        <div class="hook-box" style="font-size: 0.9rem;">${reel.hook}</div>
                    </div>
                    <div style="margin-top: 1rem;">
                        <button class="btn-primary" style="width: 100%;">View SOP Playbook →</button>
                    </div>
                </div>
            `).join('');
        }

        // Open Selected SOP Page
        function openSOP(reelId) {
            const reel = reelDatabase.find(item => item.id === reelId);
            if (!reel) return;

            const sopContainer = document.getElementById('sop-content');

            const tableRows = reel.table ? reel.table.map(row => `
                <tr>
                    <td><strong>${row.time}</strong></td>
                    <td>${row.shot}</td>
                    <td><code>${row.overlay}</code></td>
                    <td class="audio-cell">${row.audio}</td>
                </tr>
            `).join('') : '';

            sopContainer.innerHTML = `
                <span class="category-badge">${reel.category}</span>
                <h2 class="reel-title">${reel.title}</h2>
                
                <div class="hook-box">${reel.hook}</div>

                <div class="meta-grid">
                    <div class="meta-item">
                        <strong>Target Length & Format</strong>
                        ${reel.targetLength}
                    </div>
                    <div class="meta-item">
                        <strong>Banner Overlay Text</strong>
                        ${reel.bannerOverlayText}
                    </div>
                    <div class="meta-item">
                        <strong>Core Objective</strong>
                        ${reel.coreObjective}
                    </div>
                </div>

                <div class="section-title">Psychology & Mechanics</div>
                <ul>
                    ${reel.psychology.map(item => `<li>${item}</li>`).join('')}
                </ul>

                <div class="section-title">Setup Requirements</div>
                <ul>
                    ${reel.setup.map(item => `<li>${item}</li>`).join('')}
                </ul>

                <div class="section-title">Shot Breakdown</div>
                <table>
                    <thead>
                        <tr>
                            <th style="width: 12%;">Time</th>
                            <th style="width: 28%;">Shot & Action</th>
                            <th style="width: 20%;">Overlay / Text</th>
                            <th style="width: 40%;">Audio / Dialogue</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${tableRows}
                    </tbody>
                </table>

                <div class="section-title">Post-Production Notes</div>
                <ul>
                    ${reel.postProduction.map(item => `<li>${item}</li>`).join('')}
                </ul>

                <div class="meta-grid" style="margin-top: 1.5rem;">
                    <div class="meta-item">
                        <strong>Pinned Comment Strategy</strong>
                        ${reel.pinnedComment}
                    </div>
                </div>

                <div class="tags-container">
                    <span class="hashtag">${reel.hashtags}</span>
                </div>

                <div class="links">
                    <a href="${reel.fullReelUrl}" target="_blank" rel="noopener noreferrer">View Original Reel ↗</a>
                </div>
            `;

            document.getElementById('library-view').style.display = 'none';
            document.getElementById('sop-detail-view').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Return to Main Library View
        function showLibrary() {
            document.getElementById('sop-detail-view').style.display = 'none';
            document.getElementById('library-view').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Initializing page
        renderLibrary();
    </script>
</body>
</html>
