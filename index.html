        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.94); backdrop-filter: blur(12px); z-index: 100; display: none; justify-content: center; align-items: center; padding: 20px; }

        function renderGrid() {
            const grid = document.getElementById('reelsGrid');
            grid.innerHTML = '';

            reelDatabase.forEach((reel, index) => {
                const card = document.createElement('div');
                card.className = 'phone-card';

                card.innerHTML = `
                    <div class="card-header">
                        <span class="category-badge">${reel.category}</span>
                        <a href="${reel.fullReelUrl}" target="_blank" style="color: var(--text-muted); font-size: 0.75rem; display: flex; align-items: center; gap: 4px; text-decoration: none;">
                            <i data-lucide="external-link" size="12"></i> Instagram
                        </a>
                    </div>
                    
                    <!-- Cropped Frame Container: Edge-to-edge video -->
                    <div class="video-crop-container">
                        <iframe class="clean-iframe" src="${reel.embedUrl}" loading="lazy" allowfullscreen frameborder="0"></iframe>
                    </div>

                    <div class="card-footer">
                        <h3 class="card-title">${reel.title}</h3>
                        <button class="open-details-btn" onclick="openReelModal(${index})">
                            <i data-lucide="sliders" size="14"></i> Open SOP Script Details
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons();
        }

        function openReelModal(index) {
            const reel = reelDatabase[index];

            document.getElementById('modalEmbedIframe').src = reel.embedUrl;
            document.getElementById('modalExternalLink').href = reel.fullReelUrl;

            let rows = reel.table.map(r => `
                <tr>
                    <td><b>${r.time}</b></td>
                    <td>${r.shot}</td>
                    <td><span style="background: rgba(236, 72, 153, 0.2); color: #ec4899; padding: 2px 6px; border-radius: 4px; font-weight: 700;">${r.overlay}</span></td>
                    <td>${r.audio}</td>
                </tr>
            `).join('');

            let psychList = reel.psychology.map(p => `<li>${p}</li>`).join('');
            let setupList = reel.setup.map(s => `<li>${s}</li>`).join('');
            let postList = reel.postProduction.map(pp => `<li>${pp}</li>`).join('');

            document.getElementById('modalSopDetails').innerHTML = `
                <div>
                    <span style="color: var(--accent-purple); font-size: 0.8rem; font-weight: 700; text-transform: uppercase;">${reel.category}</span>
                    <h2 style="font-size: 1.5rem; font-weight: 800; margin-top: 4px;">${reel.title}</h2>
                </div>

                <div class="link-box">
                    <span style="font-size: 0.75rem; color: var(--accent-purple); font-weight: 700; display: flex; align-items: center; gap: 6px;">
                        <i data-lucide="link" size="14"></i> Full Reel URL
                    </span>
                    <a href="${reel.fullReelUrl}" target="_blank">${reel.fullReelUrl}</a>
                </div>

                <div>
                    <div class="sop-heading"><i data-lucide="target" size="18"></i> Core Objective</div>
                    <p style="color: var(--text-muted); font-size: 0.88rem;">${reel.coreObjective}</p>
                </div>

                <div>
                    <div class="sop-heading"><i data-lucide="brain" size="18"></i> 1. Algorithmic & Psychological Breakdown</div>
                    <ul class="sop-list">${psychList}</ul>
                </div>

                <div>
                    <div class="sop-heading"><i data-lucide="camera" size="18"></i> 2. Pre-Production & Setup</div>
                    <ul class="sop-list">${setupList}</ul>
                </div>

                <div>
                    <div class="sop-heading"><i data-lucide="film" size="18"></i> 3. Master Filming & Editing Table</div>
                    <p style="font-size: 0.8rem; color: #ec4899; margin-bottom: 6px;"><b>Specs:</b> ${reel.targetLength} | <b>Banner:</b> ${reel.bannerOverlayText}</p>
                    <table class="script-table">
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Camera & Visual Action</th>
                                <th>On-Screen Captions</th>
                                <th>Spoken Dialogue</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>

                <div>
                    <div class="sop-heading"><i data-lucide="sliders" size="18"></i> 4. Post-Production & Publishing Protocol</div>
                    <ol class="sop-list" style="padding-left: 20px;">${postList}</ol>
                </div>

                <div>
                    <div class="sop-heading"><i data-lucide="share-2" size="18"></i> Distribution Checklist</div>
                    <p style="color: var(--text-muted); font-size: 0.88rem;"><b>Pinned Comment:</b> ${reel.pinnedComment}</p>
                    <p style="color: var(--text-muted); font-size: 0.88rem; margin-top: 4px;"><b>Hashtags:</b> ${reel.hashtags}</p>
                </div>

                <div style="margin-top: 10px;">
                    <button onclick="copySopScript(${index})" class="btn-ui"><i data-lucide="copy" size="16"></i> Copy Complete SOP Script</button>
                </div>
            `;

            document.getElementById('reelModal').style.display = 'flex';
            lucide.createIcons();
        }

        function closeReelModal() {
            document.getElementById('modalEmbedIframe').src = '';
            document.getElementById('reelModal').style.display = 'none';
        }

        function addReelFromLink() {
            const url = document.getElementById('addUrl').value.trim();
            if(!url) return alert('Please paste a Reel link!');

            const match = url.match(/(?:reel|p)\/([^/?#&]+)/);
            const id = match ? match[1] : '';
            const embed = id ? `https://www.instagram.com/p/${id}/embed/` : url;

            reelDatabase.unshift({
                id: `reel-${Date.now()}`,
                category: 'CUSTOM REEL',
                title: 'New Reel Strategy',
                hook: 'HOOK: Custom Concept',
                fullReelUrl: url,
                embedUrl: embed,
                coreObjective: 'Custom objective details...',
                psychology: ['Custom strategy point...'],
                setup: ['Custom setup requirements...'],
                targetLength: '22 Seconds | 9:16 Vertical',
                bannerOverlayText: 'Custom Top Banner Text',
                table: [
                    { time: "0:00–0:03", shot: "Opening Hook Shot", overlay: "HOOK", audio: "Opening Dialogue" }
                ],
                postProduction: ['Custom post production step...'],
                pinnedComment: 'Comment strategy...',
                hashtags: '#realestate #reels'
            });

            renderGrid();
            document.getElementById('addUrl').value = '';
        }

        function copySopScript(index) {
            const reel = reelDatabase[index];
            const text = `SOP: ${reel.title}\nREEL LINK: ${reel.fullReelUrl}\n\nCORE OBJECTIVE:\n${reel.coreObjective}\n\nPINNED COMMENT:\n${reel.pinnedComment}\n\nHASHTAGS:\n${reel.hashtags}`;
            navigator.clipboard.writeText(text);

            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2500);
        }

        renderGrid();
    </script>
</body>
</html>
