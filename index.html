<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BUZZREELS INSPO</title>
  <style>
    :root {
      --bg-color: #0b0d17;
      --card-bg: #13172b;
      --card-border: #1e2442;
      --text-main: #ffffff;
      --accent-pink: #e91e63;
      --button-bg: #282c47;
      --input-bg: #161a33;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 24px;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .logo-icon {
      background: var(--accent-pink);
      border-radius: 8px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    header h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.5px;
      margin: 0;
      text-transform: uppercase;
    }

    /* CONTROL BAR */
    .control-bar {
      background-color: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
      position: relative;
    }

    .search-container {
      position: relative;
      flex: 1;
    }

    .search-input {
      width: 100%;
      background-color: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 12px 16px;
      color: #fff;
      font-size: 14px;
      box-sizing: border-box;
      outline: none;
    }

    .search-input::placeholder {
      color: #6c7293;
    }

    .search-suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 0 0 8px 8px;
      max-height: 240px;
      overflow-y: auto;
      z-index: 1000;
      display: none;
      box-shadow: 0 8px 16px rgba(0,0,0,0.5);
    }

    .suggestion-item {
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
      border-bottom: 1px solid var(--card-border);
    }

    .suggestion-item:hover {
      background-color: var(--input-bg);
      color: var(--accent-pink);
    }

    /* BUTTONS */
    .btn {
      border: none;
      border-radius: 8px;
      padding: 12px 20px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #fff;
      white-space: nowrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, #f06292, #e91e63);
    }

    /* REELS GRID SYSTEM */
    .reels-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }

    /* CARD DESIGN */
    .reel-card {
      background-color: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .card-header {
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .tag-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 4px 8px;
      border-radius: 12px;
      background: rgba(233, 30, 99, 0.2);
      color: var(--accent-pink);
      text-transform: uppercase;
      display: inline-block;
    }

    /* PERFECT 9:16 CROP & SCALE - ELIMINATES WHITE BOX & BLACK EDGES */
    .video-preview-wrapper {
      width: 100%;
      aspect-ratio: 9 / 16;
      overflow: hidden;
      position: relative;
      background-color: #000;
    }

    .video-preview-wrapper iframe {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 440px;
      height: 780px;
      /* Zooming in physically crops out Instagram headers, white bottom boxes, and side bars */
      transform: translate(-50%, -51%) scale(1.36);
      border: none;
    }

    .card-body {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background-color: var(--card-bg);
      z-index: 2;
    }

    .reel-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      margin: 0;
      line-height: 1.3;
      flex: 1;
    }

    /* SOP + BUTTON STYLING */
    .sop-btn {
      min-width: 38px;
      height: 38px;
      background-color: var(--button-bg);
      border: 1px solid var(--card-border);
      color: #fff;
      border-radius: 8px;
      font-weight: 700;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s, transform 0.1s;
    }

    .sop-btn:hover {
      background-color: var(--accent-pink);
      border-color: var(--accent-pink);
      transform: scale(1.05);
    }

    /* MODAL FOR GOOGLE DOC / REEL UPLOAD / SOP VIEW */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .modal-box {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 600px;
      max-height: 85vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .modal-box h3 { margin: 0; }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 12px;
      color: #9fa8da;
    }

    .form-group input {
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      padding: 10px;
      color: #fff;
    }

    .sop-content {
      font-size: 14px;
      line-height: 1.6;
      color: #d1d5db;
      white-space: pre-wrap;
      background: var(--input-bg);
      padding: 16px;
      border-radius: 8px;
      border: 1px solid var(--card-border);
    }
  </style>
</head>

    function renderGrid(data) {
      const grid = document.getElementById("reelsGrid");
      grid.innerHTML = "";

      data.forEach(item => {
        const card = document.createElement("div");
        card.className = "reel-card";
        card.innerHTML = `
          <div class="card-header">
            <span class="tag-badge">${item.tag}</span>
          </div>
          <div class="video-preview-wrapper">
            <iframe src="${item.videoUrl}" allowtransparency="true" frameborder="0" scrolling="no"></iframe>
          </div>
          <div class="card-body">
            <h3 class="reel-title">${item.title}</h3>
            <button class="sop-btn" type="button" onclick="openSOP(${item.id})" title="Open SOP">+</button>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    // SOP CLICK LOGIC: Opens modal view for embedded SOP text or external link
    function openSOP(id) {
      const item = reelsData.find(r => r.id === id);
      if (!item) return;

      if (item.sopDocUrl && item.sopDocUrl.trim() !== "") {
        window.open(item.sopDocUrl, '_blank');
      } else if (item.sopText) {
        document.getElementById("sopModalTitle").innerText = item.title;
        document.getElementById("sopModalBody").innerText = item.sopText;
        document.getElementById("sopModal").style.display = "flex";
      } else {
        const newUrl = prompt(`Attach Google Doc SOP Link for: "${item.title}"`);
        if (newUrl && newUrl.trim() !== "") {
          item.sopDocUrl = newUrl.trim();
          alert("SOP link saved!");
        }
      }
    }

    function closeSOPModal() {
      document.getElementById("sopModal").style.display = "none";
    }

    function handlePredictiveSearch() {
      const query = document.getElementById("searchInput").value.toLowerCase();
      const suggestionsBox = document.getElementById("searchSuggestions");
      
      if (!query) {
        suggestionsBox.style.display = "none";
        renderGrid(reelsData);
        return;
      }

      const filtered = reelsData.filter(item => 
        item.title.toLowerCase().includes(query) || 
        item.tag.toLowerCase().includes(query)
      );

      renderGrid(filtered);

      suggestionsBox.innerHTML = "";
      if (filtered.length > 0) {
        suggestionsBox.style.display = "block";
        filtered.forEach(item => {
          const div = document.createElement("div");
          div.className = "suggestion-item";
          div.innerText = `${item.title} (${item.tag})`;
          div.onclick = () => {
            document.getElementById("searchInput").value = item.title;
            suggestionsBox.style.display = "none";
            renderGrid([item]);
          };
          suggestionsBox.appendChild(div);
        });
      } else {
        suggestionsBox.style.display = "none";
      }
    }

    function openUploadModal() {
      document.getElementById("uploadModal").style.display = "flex";
    }

    function closeUploadModal() {
      document.getElementById("uploadModal").style.display = "none";
    }

    function addNewReel() {
      const title = document.getElementById("reelTitleInput").value;
      const tag = document.getElementById("reelTagInput").value || "NEW REEL";
      const videoUrl = document.getElementById("reelUrlInput").value;
      const gdocUrl = document.getElementById("gdocUrlInput").value;

      if (!title || !videoUrl) {
        alert("Please enter a title and Instagram Reel link.");
        return;
      }

      let formattedEmbed = videoUrl;
      if (!videoUrl.includes("/embed")) {
        formattedEmbed = videoUrl.split("?")[0] + "embed";
      }

      const newReel = {
        id: Date.now(),
        tag: tag.toUpperCase(),
        title: title.toUpperCase(),
        videoUrl: formattedEmbed,
        sopDocUrl: gdocUrl || "",
        sopText: "Standard Operating Procedure available via URL link."
      };

      reelsData.unshift(newReel);
      renderGrid(reelsData);
      closeUploadModal();

      document.getElementById("reelTitleInput").value = "";
      document.getElementById("reelTagInput").value = "";
      document.getElementById("reelUrlInput").value = "";
      document.getElementById("gdocUrlInput").value = "";
    }

    renderGrid(reelsData);
  </script>
