<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reels & SOP Operating System</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #07090e;
            --bg-card: #111827;
            --accent-purple: #a78bfa;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.12);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            padding: 30px 20px;
            margin: 0;
        }

        .reels-grid {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 32px;
            justify-items: center;
        }

        .phone-card {
            width: 320px;
            background: #000;
            border-radius: 24px;
            border: 2px solid var(--border-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .iframe-container {
            width: 100%;
            height: 480px;
            background: #000;
            position: relative;
        }

        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .phone-footer {
            padding: 16px;
            background: var(--bg-card);
            border-top: 1px solid var(--border-color);
        }

        .btn-launch {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.8rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="reels-grid" id="reelsGrid"></div>

    <script>
        const reels = [
            {
                title: "If Real Estate Videos Were Honest",
                reelUrl: "https://www.instagram.com/reel/DOUWDBcEj1Z/"
            }
        ];

        function getInstagramEmbedUrl(url) {
            // Extract post ID and format clean embed link
            const match = url.match(/(?:reel|p)\/([^/?#&]+)/);
            if (match && match[1]) {
                return `https://www.instagram.com/p/${match[1]}/embed/captioned/`;
            }
            return url;
        }

        function renderGrid() {
            const grid = document.getElementById('reelsGrid');
            grid.innerHTML = '';

            reels.forEach(reel => {
                const embedUrl = getInstagramEmbedUrl(reel.reelUrl);
                const card = document.createElement('div');
                card.className = 'phone-card';

                card.innerHTML = `
                    <div class="iframe-container">
                        <iframe src="${embedUrl}" loading="lazy" allowfullscreen frameborder="0"></iframe>
                    </div>
                    <div class="phone-footer">
                        <h3 style="margin:0; font-size: 0.95rem;">${reel.title}</h3>
                        <a href="${reel.reelUrl}" target="_blank" class="btn-launch">
                            Open Direct in Instagram
                        </a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        renderGrid();
    </script>
</body>
</html>
