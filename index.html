<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REELS & SOP OPERATING SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #07090e;
            --bg-card: #111827;
            --accent-gradient: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            --accent-purple: #a78bfa;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; padding: 30px 20px; }

        header { max-width: 1400px; margin: 0 auto 24px auto; display: flex; align-items: center; gap: 12px; }
        .brand-icon { width: 42px; height: 42px; background: var(--accent-gradient); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #fff; }
        .brand h1 { font-size: 1.5rem; font-weight: 800; }

        .reel-control-bar { max-width: 1400px; margin: 0 auto 30px auto; background: var(--bg-card); border: 1px solid var(--border-color); padding: 16px; border-radius: 16px; display: flex; gap: 12px; }
        .input-field { flex: 1; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-color); color: var(--text-main); padding: 12px 16px; border-radius: 10px; outline: none; font-size: 0.88rem; }
        .btn-main { background: var(--accent-gradient); color: #fff; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; }

        .reels-grid { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 32px; justify-items: center; }
        
        /* Main Library Playable Cards */
        .phone-card { width: 360px; background: #000; border-radius: 20px; border: 2px solid #1f2937; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 10px 25px rgba(0,0,0,0.5); transition: border-color 0.3s ease; }
        .phone-card:hover { border-color: #ec4899; }
        .card-header { padding: 12px 16px; background: var(--bg-card); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .category-badge { background: rgba(236, 72, 153, 0.25); color: #ec4899; padding: 4px 10px; border-radius: 12px; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; }
        
        .main-card-iframe { width: 100%; height: 500px; border: none; background: #000; }
        
        .card-footer { padding: 14px 16px; background: var(--bg-card); border-top: 1px solid var(--border-color); }
        .card-title { font-size: 1rem; font-weight: 700; color: #fff; }
        .card-hook { font-size: 0.78rem; color: #ec4899; font-weight: 600; margin-top: 4px; }
        .open-details-btn { margin-top: 12px; background: rgba(167, 139, 250, 0.15); color: var(--accent-purple); border: 1px solid rgba(167, 139, 250, 0.4); width: 100%; padding: 10px; border-radius: 8px; font-size: 0.8rem; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer; transition: all 0.2s ease; }
        .open-details-btn:hover { background: var(--accent-purple); color: #000; }

        /* Modal Player Overlay */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.94); backdrop-filter: blur(12px); z-index: 100; display: none; justify-content: center; align-items: center; padding: 20px; }
        .modal-body { background: var(--bg-card); border: 1px solid var(--border-color); width: 100%; max-width: 1150px; height: 90vh; border-radius: 24px; display: flex; overflow: hidden; position: relative; }
        .modal-phone-view { width: 400px; background: #000; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; border-right: 1px solid var(--border-color); flex-shrink: 0; padding: 16px; overflow-y: auto; }
        .modal-sop-details { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .close-modal-btn { position: absolute; top: 16px; right: 16px; background: rgba(255, 255, 255, 0.1); border: none; color: #fff; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }

        /* Embed Frame */
        .instagram-frame { width: 100%; height: 600px; border: none; border-radius: 12px; background: #000; }

        .sop-heading { font-size: 1rem; font-weight: 700; color: var(--accent-purple); display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .link-box { background: rgba(255, 255, 255, 0.04); border: 1px solid var(--border-color); padding: 12px 16px; border-radius: 12px; display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
        .link-box a { color: #60a5fa; font-size: 0.82rem; word-break: break-all; text-decoration: underline; font-weight: 600; line-height: 1.4; }

        .script-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; margin-top: 8px; border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; }
        .script-table th { background: rgba(255, 255, 255, 0.05); padding: 10px; text-align: left; color: var(--text-muted); }
        .script-table td { padding: 10px; border-top: 1px solid var(--border-color); vertical-align: top; }
        .sop-list { padding-left: 18px; color: var(--text-muted); font-size: 0.88rem; line-height: 1.6; }

        .btn-ui { background: var(--accent-gradient); color: #fff; border: none; padding: 12px 20px; border-radius: 20px; font-weight: 700; font-size: 0.85rem; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; text-decoration: none; }
        .toast { position: fixed; bottom: 24px; right: 24px; background: var(--accent-gradient); color: #fff; padding: 12px 24px; border-radius: 30px; font-weight: 700; display: none; z-index: 200; }
    </style>
</head>
<body>

    <header>
        <div class="brand-icon"><i data-lucide="video"></i></div>
        <div class="brand"><h1>REELS & SOP OPERATING SYSTEM</h1></div>
    </header>

    <div class="reel-control-bar">
        <input type="text" id="addUrl" class="input-field" placeholder="Paste Full Instagram Reel Link...">
        <button class="btn-main" onclick="addReelFromLink()"><i data-lucide="plus"></i> Add Reel</button>
    </div>

    <div class="reels-grid" id="reelsGrid"></div>

    <div class="modal-overlay" id="reelModal">
        <div class="modal-body">
            <button class="close-modal-btn" onclick="closeReelModal()"><i data-lucide="x"></i></button>

            <!-- Instagram Live Embed Frame Viewport inside Modal -->
            <div class="modal-phone-view">
                <iframe id="modalEmbedIframe" class="instagram-frame" src="" loading="lazy" allowfullscreen frameborder="0"></iframe>
                <a id="modalExternalLink" href="#" target="_blank" class="btn-ui" style="margin-top: 12px; font-size: 0.78rem; width: 100%; justify-content: center;">
                    <i data-lucide="external-link" size="14"></i> Open Direct on Instagram
                </a>
            </div>

            <!-- SOP Details Area -->
            <div class="modal-sop-details" id="modalSopDetails"></div>
        </div>
    </div>

    <div class="toast" id="toast">SOP Copied to Clipboard!</div>

    <script>
        lucide.createIcons();

        // Complete Database
        let reelDatabase = [
            {
                id: 'honest-reels',
                category: 'SATIRE & META',
                title: 'If Real Estate Videos Were Honest',
                hook: "HOOK: 'It's not my listing... but I'm going to make it look like it is.'",
                fullReelUrl: 'https://www.instagram.com/reel/DOUWDbcEj1Z/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA==',
                embedUrl: 'https://www.instagram.com/p/DOUWDbcEj1Z/embed/captioned/',
                coreObjective: 'Drive top-of-funnel reach, high engagement, and client trust through radical transparency, meta-humor, and seamless loop mechanics.',
                psychology: [
                    'Subversive Meta-Humor: Breaks the fourth wall by admitting industry tropes (borrowing listings, performative B-roll, low sales volume). Radical self-deprecation immediately builds authenticity.',
                    'Persistent Visual Anchor: Fixed top banner ("If real estate videos were honest") maintains context for silent scrollers.',
                    'Rapid Pattern Breaks: Visual switches every 3 seconds prevent viewer fatigue.',
                    'Infinite Audio Loop: Cutting abruptly on your name at 0:22 feeds directly into Shot 1 (0:00).'
                ],
                setup: [
                    'Location Strategy: High-end property with diverse visual areas (driveway, foyer, kitchen, bathroom mirror, porch).',
                    'Audio Requirements: Wireless lapel microphone for voice-isolated audio.',
                    'Visual Styling: Top banner (White box, black bold text: "If real estate videos were honest").'
                ],
                targetLength: '22 Seconds | Aspect Ratio: 9:16 Vertical (1080x1920)',
                bannerOverlayText: 'If real estate videos were honest (On-screen 0:00 to end)',
                table: [
                    { time: "0:00–0:03", shot: "Shot 1 (Hook): Medium-wide shot. Walking toward camera down driveway with open hands.", overlay: "NOT MY LISTING", audio: "It's not my listing... but I'm going to make it look like it is." },
                    { time: "0:03–0:06", shot: "Shot 2 (Pivot): Medium shot. Standing in foyer gesturing proud.", overlay: "ALL ABOUT ME", audio: "This video isn't about the house. It's about me—well, a version that appeals to you." },
                    { time: "0:06–0:09", shot: "Shot 3 (B-Roll 1): Extreme close-up. Hand slowly gliding over countertop.", overlay: "CARESSING COUNTERTOPS", audio: "A version that strolls aimlessly caressing countertops..." },
                    { time: "0:09–0:12", shot: "Shot 4 (B-Roll 2): Kneeling in kitchen, nodding deeply while opening oven door.", overlay: "EXPERT MODE", audio: "...and pretends to be knowledgeable about technical details I know nothing about." },
                    { time: "0:12–0:15", shot: "Shot 5 (B-Roll 3): Medium shot via bathroom mirror. Splashing water on face.", overlay: "NOT HUNGOVER", audio: "...a version that doesn't look exhausted or hungover." },
                    { time: "0:15–0:19", shot: "Shot 6 (The Stat): Sitting at kitchen island talking directly into lens.", overlay: "70% SOCIAL MEDIA", audio: "I spend 70% of my time on social media so you think I'm busy. My actual production is tiny..." },
                    { time: "0:19–0:22", shot: "Shot 7 (The Close): Sitting on porch chair, leaning in with deadpan expression.", overlay: "CHOICE IS CLEAR", audio: "So do you want an overly salesy guru, or a guru who's overly salesy? Hi, I'm [Name]— [Cut abruptly]" }
                ],
                postProduction: [
                    'Tight Jump-Cuts: Trim micro-pauses between sentences.',
                    'Text Overlay Formatting: Fixed top white banner; single/double word animated captions.',
                    'Audio Mixing: Direct Audio at 0dB; Acoustic/Jazz background track at -22dB to -24dB.',
                    'Seamless Loop Edit: Trim Shot 7 mid-word ("Hi, I\'m Mike—") connecting straight back to Shot 1.',
                    'Distribution: Publish across Instagram Reels, TikTok, YouTube Shorts, and Facebook Reels.'
                ],
                pinnedComment: 'Be honest: How many real estate videos have you swiped past today? 😂👇',
                hashtags: '#realestatehumor #realestatetips #realestateagent #realtorlife #homebuyingtips #listingagent'
            }
        ];

        function renderGrid() {
            const grid = document.getElementById('reelsGrid');
            grid.innerHTML = '';

            reelDatabase.forEach((reel, index) => {
                const card = document.createElement('div');
                card.className = 'phone-card';

                card.innerHTML = `
                    <div class="card-header">
                        <span class="category-badge">${reel.category}</span>
                        <a href="${reel.fullReelUrl}" target="_blank" style="color: var(--text-muted); font-size: 0.75rem; display: flex; align-items: center; gap: 4px; text-decoration: none;">
                            <i data-lucide="external-link" size="12"></i> Instagram
                        </a>
                    </div>
                    
                    <!-- Directly Playable Reel in Main Library -->
                    <iframe class="main-card-iframe" src="${reel.embedUrl}" loading="lazy" allowfullscreen frameborder="0"></iframe>

                    <div class="card-footer">
                        <h3 class="card-title">${reel.title}</h3>
                        <p class="card-hook">${reel.hook}</p>
                        <button class="open-details-btn" onclick="openReelModal(${index})">
                            <i data-lucide="sliders" size="14"></i> Open SOP Script Details
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons();
        }

        function openReelModal(index) {
            const reel = reelDatabase[index];

            document.getElementById('modalEmbedIframe').src = reel.embedUrl;
            document.getElementById('modalExternalLink').href = reel.fullReelUrl;

            let rows = reel.table.map(r => `
                <tr>
                    <td><b>${r.time}</b></td>
                    <td>${r.shot}</td>
                    <td><span style="background: rgba(236, 72, 153, 0.2); color: #ec4899; padding: 2px 6px; border-radius: 4px; font-weight: 700;">${r.overlay}</span></td>
                    <td>${r.audio}</td>
                </tr>
            `).join('');

            let psychList = reel.psychology.map(p => `<li>${p}</li>`).join('');
            let setupList = reel.setup.map(s => `<li>${s}</li>`).join('');
            let postList = reel.postProduction.map(pp => `<li>${pp}</li>`).join('');

            document.getElementById('modalSopDetails').innerHTML = `
                <div>
                    <span style="color: var(--accent-purple); font-size: 0.8rem; font-weight: 700; text-transform: uppercase;">${reel.category}</span>
                    <h2 style="font-size: 1.5rem; font-weight: 800; margin-top: 4px;">${reel.title}</h2>
                </div>

                <div class="link-box">
                    <span style="font-size: 0.75rem; color: var(--accent-purple); font-weight: 700; display: flex; align-items: center; gap: 6px;">
                        <i data-lucide="link" size="14"></i> Full Reel URL
                    </span>
                    <a href="${reel.fullReelUrl}" target="_blank">${reel.fullReelUrl}</a>
                </div>

                <div>
                    <div class="sop-heading"><i data-lucide="target" size="18"></i> Core Objective</div>
                    <p style="color: var(--text-muted); font-size: 0.88rem;">${reel.coreObjective}</p>
                </div>

                <div>
                    <div class="sop-heading"><i data-lucide="brain" size="18"></i> 1. Algorithmic & Psychological Breakdown</div>
                    <ul class="sop-list">${psychList}</ul>
                </div>

                <div>
                    <div class="sop-heading"><i data-lucide="camera" size="18"></i> 2. Pre-Production & Setup</div>
                    <ul class="sop-list">${setupList}</ul>
                </div>

                <div>
                    <div class="sop-heading"><i data-lucide="film" size="18"></i> 3. Master Filming & Editing Table</div>
                    <p style="font-size: 0.8rem; color: #ec4899; margin-bottom: 6px;"><b>Specs:</b> ${reel.targetLength} | <b>Banner:</b> ${reel.bannerOverlayText}</p>
                    <table class="script-table">
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Camera & Visual Action</th>
                                <th>On-Screen Captions</th>
                                <th>Spoken Dialogue</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>

                <div>
                    <div class="sop-heading"><i data-lucide="sliders" size="18"></i> 4. Post-Production & Publishing Protocol</div>
                    <ol class="sop-list" style="padding-left: 20px;">${postList}</ol>
                </div>

                <div>
                    <div class="sop-heading"><i data-lucide="share-2" size="18"></i> Distribution Checklist</div>
                    <p style="color: var(--text-muted); font-size: 0.88rem;"><b>Pinned Comment:</b> ${reel.pinnedComment}</p>
                    <p style="color: var(--text-muted); font-size: 0.88rem; margin-top: 4px;"><b>Hashtags:</b> ${reel.hashtags}</p>
                </div>

                <div style="margin-top: 10px;">
                    <button onclick="copySopScript(${index})" class="btn-ui"><i data-lucide="copy" size="16"></i> Copy Complete SOP Script</button>
                </div>
            `;

            document.getElementById('reelModal').style.display = 'flex';
            lucide.createIcons();
        }

        function closeReelModal() {
            document.getElementById('modalEmbedIframe').src = '';
            document.getElementById('reelModal').style.display = 'none';
        }

        function addReelFromLink() {
            const url = document.getElementById('addUrl').value.trim();
            if(!url) return alert('Please paste a Reel link!');

            const match = url.match(/(?:reel|p)\/([^/?#&]+)/);
            const id = match ? match[1] : '';
            const embed = id ? `https://www.instagram.com/p/${id}/embed/captioned/` : url;

            reelDatabase.unshift({
                id: `reel-${Date.now()}`,
                category: 'CUSTOM REEL',
                title: 'New Reel Strategy',
                hook: 'HOOK: Custom Concept',
                fullReelUrl: url,
                embedUrl: embed,
                coreObjective: 'Custom objective details...',
                psychology: ['Custom strategy point...'],
                setup: ['Custom setup requirements...'],
                targetLength: '22 Seconds | 9:16 Vertical',
                bannerOverlayText: 'Custom Top Banner Text',
                table: [
                    { time: "0:00–0:03", shot: "Opening Hook Shot", overlay: "HOOK", audio: "Opening Dialogue" }
                ],
                postProduction: ['Custom post production step...'],
                pinnedComment: 'Comment strategy...',
                hashtags: '#realestate #reels'
            });

            renderGrid();
            document.getElementById('addUrl').value = '';
        }

        function copySopScript(index) {
            const reel = reelDatabase[index];
            const text = `SOP: ${reel.title}\nREEL LINK: ${reel.fullReelUrl}\n\nCORE OBJECTIVE:\n${reel.coreObjective}\n\nPINNED COMMENT:\n${reel.pinnedComment}\n\nHASHTAGS:\n${reel.hashtags}`;
            navigator.clipboard.writeText(text);

            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2500);
        }

        renderGrid();
    </script>
</body>
</html>
